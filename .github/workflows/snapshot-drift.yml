name: Snapshot Drift Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  snapshot-drift:
    name: Check for Uncommitted Snapshot Drift
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ensure we have the full history for accurate diffing
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            stellar-lend/contracts/hello-world
            stellar-lend/contracts/lending

      - name: Install cargo-nextest (optional, for better test output)
        run: cargo install cargo-nextest --locked || true

      - name: Run snapshot drift check
        env:
          SNAPSHOT_CHECK: "1"
        run: |
          chmod +x scripts/check-snapshots.sh
          ./scripts/check-snapshots.sh

      - name: Upload diff artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs-${{ github.run_id }}
          path: /tmp/snapshot-diff-*.txt
          if-no-files-found: ignore

      - name: Comment PR with failure instructions
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ⚠️ Snapshot Drift Detected

            The CI found uncommitted snapshot drift in \`test_snapshots/\`.

            **To fix:**
            1. Run \`./scripts/regenerate-snapshots.sh\` locally
            2. Review the diff: \`git diff stellar-lend/contracts/*/test_snapshots/\`
            3. Commit if changes are intentional:
               \`\`\`bash
               git add stellar-lend/contracts/*/test_snapshots/
               git commit -m "chore: regenerate test snapshots"
               \`\`\`

            **If drift is NOT intentional:** Your code changes introduced unintended behavior. Fix the code, do not regenerate.

            See [docs/LOCAL_CI_RUNBOOK.md](../docs/LOCAL_CI_RUNBOOK.md) for details.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });